<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba8a0"/>
      <stop offset="100%" style="stop-color:#3d7a8a"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="400" height="400" rx="88" fill="#0f1117"/>
  <!-- White keys -->
  <rect x="62" y="125" width="50" height="200" rx="12" fill="#e8e8ec" opacity="0.9"/>
  <rect x="125" y="125" width="50" height="200" rx="12" fill="#e8e8ec" opacity="0.9"/>
  <rect x="188" y="125" width="50" height="200" rx="12" fill="#e8e8ec" opacity="0.9"/>
  <rect x="250" y="125" width="50" height="200" rx="12" fill="#e8e8ec" opacity="0.9"/>
  <!-- Black keys -->
  <rect x="94" y="125" width="38" height="125" rx="9" fill="#1a1a2e"/>
  <rect x="156" y="125" width="38" height="125" rx="9" fill="#1a1a2e"/>
  <rect x="256" y="125" width="38" height="125" rx="9" fill="#1a1a2e"/>
  <!-- Neon glow on one key -->
  <rect x="188" y="125" width="50" height="200" rx="12" fill="url(#g)" opacity="0.35"/>
  <!-- Subtle glow -->
  <circle cx="213" cy="225" r="75" fill="#5ba8a0" opacity="0.12" filter="url(#blur)"/>
