<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba8a0"/>
      <stop offset="100%" style="stop-color:#3d7a8a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f1117"/>
  <!-- White keys -->
  <rect x="10" y="20" width="8" height="32" rx="2" fill="#e8e8ec" opacity="0.9"/>
  <rect x="20" y="20" width="8" height="32" rx="2" fill="#e8e8ec" opacity="0.9"/>
  <rect x="30" y="20" width="8" height="32" rx="2" fill="#e8e8ec" opacity="0.9"/>
  <rect x="40" y="20" width="8" height="32" rx="2" fill="#e8e8ec" opacity="0.9"/>
  <!-- Black keys -->
  <rect x="15" y="20" width="6" height="20" rx="1.5" fill="#1a1a2e"/>
  <rect x="25" y="20" width="6" height="20" rx="1.5" fill="#1a1a2e"/>
  <rect x="41" y="20" width="6" height="20" rx="1.5" fill="#1a1a2e"/>
  <!-- Neon glow on one key -->
  <rect x="30" y="20" width="8" height="32" rx="2" fill="url(#g)" opacity="0.35"/>
  <!-- Subtle glow -->
  <circle cx="34" cy="36" r="12" fill="#5ba8a0" opacity="0.12" filter="url(#blur)"/>
  <filter id="blur"><feGaussianBlur stdDeviation="4"/></filter>
</svg>
